# Ablation: p1d_transformer
encoder:
  input_dim: 80
  encoder_dim: 512
  num_heads: 8
  ffn_dim: 2048
  num_layers: 12
  depthwise_conv_kernel_size: 31
  dropout: 0.1
  checkpoint_path: checkpoints/encoder_base/encoder_final.pt
projector:
  name: transformer
  kwargs:
    d_model: 768
    num_layers: 4
    num_heads: 12
    ffn_dim: 3072
    dropout: 0.1
    downsample_factor: 3
llm:
  model_name_or_path: McGill-NLP/AfriqueGemma-4B
  dtype: bfloat16
  freeze: true
  lora:
    r: 8
    lora_alpha: 16
    lora_dropout: 0.05
    target_modules:
    - q_proj
    - v_proj
    - k_proj
    - o_proj

training:
  batch_size: 8
  lr: 1.0e-05
  weight_decay: 0.01
  total_steps: 25000
  save_every_steps: 5000
  log_every_steps: 100
  eval_every_steps: 5000
  num_workers: 4
  grad_accum_steps: 8
  scheduler:
    name: cosine_warmup_restarts
    max_lr: 1.0e-05
    min_lr: 1.0e-07
    first_cycle_steps: 12500
    warmup_steps: 1000
    cycle_mult: 1.0
    gamma: 1.0
data:
  task: asr
  index_paths: /ocean/projects/cis250145p/shared/datasets/ASR_index_20260316_062438.csv
  sample_rate: 16000
  split: train
  languages:
  - bemba
  - hausa
  - igbo
  - yoruba
  sources: null
  max_duration: 30.0
  min_duration: 0.1
  max_target_length: 256
  lowercase: true
  balance_by: language
  samples_per_group: null
wandb:
  enabled: true
  project: iwslt2026-st
  name: p1-transformer
  tags:
  - phase1
  - projector
  - transformer
  - asr
