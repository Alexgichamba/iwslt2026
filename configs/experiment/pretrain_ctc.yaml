# Experiment: Pretrain conformer encoder with CTC on ASR data
# Usage: python -m st.training.pretrain_encoder --config configs/experiment/pretrain_ctc.yaml

# base
# encoder:
#   input_dim: 80
#   encoder_dim: 512
#   num_heads: 8
#   ffn_dim: 2048
#   num_layers: 12
#   depthwise_conv_kernel_size: 31
#   dropout: 0.1

# large
encoder:
  input_dim: 80
  encoder_dim: 768
  num_heads: 12
  ffn_dim: 3072
  num_layers: 18
  depthwise_conv_kernel_size: 31
  dropout: 0.1

training:
  batch_size: 32
  lr: 1.0e-4
  weight_decay: 0.01
  total_steps: 100000            # total optimizer steps
  eval_every_steps: 5000        # evaluation interval
  save_every_steps: 20000        # checkpoint interval
  log_every_steps: 100           # wandb + console log interval
  num_workers: 4
  scheduler:
    name: cosine_warmup_restarts
    max_lr: 1.0e-4
    min_lr: 5.0e-7
    first_cycle_steps: 50000
    warmup_steps: 5000
    cycle_mult: 1.0
    gamma: 0.5

data:
  index_paths: "/ocean/projects/cis250145p/shared/datasets/ASR_index_20260316_062438.csv"
  sample_rate: 16000
  split: train
  languages:
    - bemba
    - hausa
    - igbo
    - yoruba
  sources: null
  lowercase: true
  max_duration: 30.0
  min_duration: 0.1
  balance_by: language
  samples_per_group: null

wandb:
  enabled: true
  project: iwslt2026-st
  name: pretrain-encoder-ctc
  tags: [stage1, ctc, conformer]