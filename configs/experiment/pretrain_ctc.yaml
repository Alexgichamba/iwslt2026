# Stage 1: CTC encoder pretraining on ASR data.

encoder:
  input_dim: 80
  encoder_dim: 512
  num_heads: 8
  ffn_dim: 2048
  num_layers: 12
  depthwise_conv_kernel_size: 31
  dropout: 0.1

data:
  train_index: /ocean/projects/cis250145p/shared/datasets/ASR_INDEX.csv
  val_index:   /ocean/projects/cis250145p/shared/datasets/ASR_INDEX.csv
  train_split: train
  val_split:   dev
  languages:
    - igbo
    - yoruba
    - hausa
    - bemba
  max_duration: 30.0
  min_duration: 0.1
  lowercase: false
  # Vocab saved here so Stage 2/3 can load it
  vocab_path: checkpoints/encoder/vocab.json

training:
  output_dir: checkpoints/encoder
  total_steps: 200000
  lr: 1e-4
  min_lr: 1e-6
  weight_decay: 0.01

  scheduler:
    name: cosine_warmup_restarts
    warmup_steps: 5000
    first_cycle_steps: 200000

  max_batch_duration: 240.0   # seconds of audio per batch
  max_batch_size: 32
  val_batch_size: 16
  num_workers: 4

  log_every_steps: 200
  save_every_steps: 10000
  eval_every_steps: 5000

wandb:
  enabled: true
  project: iwslt2026
  name: pretrain-ctc-conformer-base
