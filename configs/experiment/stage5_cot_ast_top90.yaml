# Stage 5: CoT-AST training (transcript + translation, supervised end-to-end).

encoder:
  input_dim: 80
  encoder_dim: 768
  num_heads: 12
  ffn_dim: 3072
  num_layers: 18
  depthwise_conv_kernel_size: 31
  dropout: 0.1
  checkpoint: /ocean/projects/cis250145p/shared/checkpoints/encoder_large/encoder_final.pt
  vocab_size: 218

aura:
  checkpoint: /ocean/projects/cis250145p/shared/checkpoints/Aura-1B/model.pt
  tokenizer:  /ocean/projects/cis250145p/shared/checkpoints/Aura-1B/tokenizer.json
  size: 1b

projector:
  type: transformer
  num_layers: 2
  num_heads: 8
  dropout: 0.1

ctc_compress:
  enabled: true
  strategy: avg
  remove_blanks: true
  blank_id: 0

data:
  task: cot
  train_index: /ocean/projects/cis250145p/shared/datasets/AST_SYNTH_INDEX_top90.csv
  val_index:   /ocean/projects/cis250145p/shared/datasets/AST_SYNTH_INDEX_top90.csv
  train_split: train
  val_split:   dev
  src_languages:
    - igbo
    - yoruba
    - hausa
    - bemba
  tgt_languages:
    - english
  max_duration: 20.0
  lowercase: true
  vocab_path: /ocean/projects/cis250145p/shared/checkpoints/encoder_large/vocab.json

training:
  output_dir: runs/stage5_cot_ast_top90
  val_samples_per_lang: 100
  projector_checkpoint: runs/stage2/checkpoint_step6000
  unfreeze_encoder: true
  unfreeze_llm: true
  lora_rank: 0

  ctc_weight: 0.2

  max_target_tokens: 384

  max_steps: 50000
  lr: 5.0e-5
  min_lr: 1.0e-7
  warmup_steps: 1000
  first_cycle_steps: 50000
  gamma: 0.75
  scheduler: cosine_warmup_restarts
  weight_decay: 0.01
  grad_accum: 1

  max_batch_duration: 180.0
  max_batch_size: 48
  max_seq_len: 1536
  num_workers: 8

  log_every: 50
  save_every: 2000
  eval_every: 2000

  no_wandb: false
  wandb_project: iwslt2026
  wandb_run_name: stage5_cot_ast_top90

wandb:
  enabled: true
  project: iwslt2026
  name: stage5-cot-ast-top90