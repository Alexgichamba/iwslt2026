# Stage 2: Projector alignment only.
# encoder and projector training
# Short run to align the audio embedding space before LoRA.

encoder:
  input_dim: 80
  encoder_dim: 768
  num_heads: 12
  ffn_dim: 3072
  num_layers: 18
  depthwise_conv_kernel_size: 31
  dropout: 0.1
  checkpoint: /ocean/projects/cis250145p/shared/checkpoints/encoder_large/encoder_final.pt
  vocab_size: 218           # match Stage 1 vocab size for CTC compressor

aura:
  checkpoint: /ocean/projects/cis250145p/tanghang/iwslt2026/tests/model.pt
  tokenizer:  /ocean/projects/cis250145p/tanghang/iwslt2026/tests/tokenizer.json
  size: 1b

projector:
  type: transformer
  num_layers: 2
  num_heads: 8
  dropout: 0.1

ctc_compress:
  enabled: true
  strategy: avg
  remove_blanks: true
  blank_id: 0

data:
  train_index: /ocean/projects/cis250145p/shared/datasets/ASR_INDEX.csv
  val_index:   /ocean/projects/cis250145p/shared/datasets/ASR_INDEX.csv
  train_split: train
  val_split:   dev
  languages:
    - igbo
    - yoruba
    - hausa
    - bemba
  max_duration: 20.0
  lowercase: true
  vocab_path: /ocean/projects/cis250145p/shared/checkpoints/encoder_large/vocab.json

training:
  task: transcribe
  output_dir: runs/stage2

  unfreeze_encoder: false
  unfreeze_llm: false
  lora_rank: 0

  ctc_weight: 0.0

  max_steps: 20000
  lr: 5.0e-5
  min_lr: 1.0e-6
  warmup_steps: 500
  first_cycle_steps: 10000
  gamma: 0.5
  scheduler: cosine_warmup_restarts
  weight_decay: 0.01
  grad_accum: 4

  max_batch_duration: 180.0
  max_batch_size: 96
  max_seq_len: 1024
  num_workers: 12

  log_every: 100
  save_every: 2000
  eval_every: 2000

  no_wandb: false
  wandb_project: Aura_Multilingual_1b
  wandb_entity: etanghan-carnegie-mellon-university
  wandb_run_name: stage2_projector_alignment

wandb:
  enabled: true
  project: iwslt2026
  name: stage2
