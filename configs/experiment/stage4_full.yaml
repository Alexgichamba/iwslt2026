# Stage 4: Full fine-tuning (encoder + projector + full LLM).
# Use a much lower LR than Stage 3 — all 1B+ params are trainable.
# Typically run after Stage 3 to refine a strong checkpoint.

encoder:
  input_dim: 80
  encoder_dim: 768
  num_heads: 12
  ffn_dim: 3072
  num_layers: 18
  depthwise_conv_kernel_size: 31
  dropout: 0.1
  checkpoint: /ocean/projects/cis250145p/shared/checkpoints/encoder_large/encoder_final.pt
  vocab_size: 218           # match Stage 1 vocab size for CTC compressor

aura:
  checkpoint: Aura-1B/model.pt
  tokenizer:  Aura-1B/tokenizer.json
  size: 1b

projector:
  type: transformer
  num_layers: 2
  num_heads: 8
  dropout: 0.1

ctc_compress:
  enabled: true
  strategy: avg
  remove_blanks: true
  blank_id: 0

data:
  train_index: /ocean/projects/cis250145p/shared/datasets/ASR_INDEX.csv
  val_index:   /ocean/projects/cis250145p/shared/datasets/ASR_INDEX.csv
  train_split: train
  val_split:   dev
  languages:
    - igbo
    - yoruba
    - hausa
    - bemba
  max_duration: 20.0
  lowercase: true
  vocab_path: /ocean/projects/cis250145p/shared/checkpoints/encoder_large/vocab.json

training:
  task: transcribe
  output_dir: runs/stage4_full

  val_samples_per_lang: 100
  # Weights from stage 2 — set these before launching stage 3
  projector_checkpoint: 
  # encoder_checkpoint:

  unfreeze_encoder: false
  unfreeze_llm: true
  lora_rank: 0

  ctc_weight: 0.0

  max_steps: 20000
  lr: 5.0e-5
  min_lr: 1.0e-7
  warmup_steps: 500
  first_cycle_steps: 10000
  gamma: 0.5
  scheduler: cosine_warmup_restarts
  weight_decay: 0.01
  grad_accum: 4

  max_batch_duration: 240.0
  max_batch_size: 96
  max_seq_len: 1024
  num_workers: 8

  log_every: 50
  save_every: 2000
  eval_every: 2000

  no_wandb: false
  wandb_project: iwslt2026
  wandb_run_name: stage4_full_finetune

wandb:
  enabled: true
  project: iwslt2026
  name: stage4-full
