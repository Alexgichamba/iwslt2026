# Experiment: End-to-end ASR with LLM (architecture ablations)
# Speech → projector → LLM → transcript
# Usage: python -m st.training.train_st --config configs/experiment/train_e2e_asr.yaml

encoder:
  input_dim: 80
  encoder_dim: 512
  num_heads: 8
  ffn_dim: 2048
  num_layers: 12
  depthwise_conv_kernel_size: 31
  dropout: 0.1
  checkpoint_path: "checkpoints/encoder_base/encoder_final.pt"

projector:
  name: conv1d                     # swap for ablations: mlp, concat, conv1d, transformer, qformer
  kwargs:
    downsample_factor: 5
    hidden_dim: 2048

# Optional: uncomment to enable CTC compression before projector
# ctc_compress:
#   strategy: avg                  # avg, weighted, or softmax
#   remove_blanks: true

llm:
  model_name_or_path: "McGill-NLP/AfriqueGemma-4B"
  dtype: bfloat16
  freeze: true
  lora:
    r: 16
    lora_alpha: 32
    lora_dropout: 0.05
    target_modules:
      - q_proj
      - v_proj
      - k_proj
      - o_proj

training:
  batch_size: 8
  lr: 1.0e-5
  weight_decay: 0.01
  total_steps: 50000
  save_every_steps: 10000
  log_every_steps: 100
  eval_every_steps: 5000
  num_workers: 4
  grad_accum_steps: 1
  scheduler:
    name: cosine_warmup_restarts
    max_lr: 1.0e-5
    min_lr: 1.0e-7
    warmup_steps: 1000
    cycle_mult: 1.0
    gamma: 1.0

data:
  task: asr                         # end-to-end ASR
  index_paths: "/ocean/projects/cis250145p/shared/datasets/ASR_index_20260316_062438.csv"
  sample_rate: 16000
  split: train
  languages:
    - bemba
    - hausa
    - igbo
    - yoruba
  sources: null
  max_duration: 30.0
  min_duration: 0.1
  max_target_length: 256
  lowercase: true
  balance_by: language
  samples_per_group: null

wandb:
  enabled: true
  project: iwslt2026-st
  name: e2e-asr-conv1d
  tags: [e2e-asr, conv1d, lora]